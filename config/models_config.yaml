# ===== LLM 프로바이더 선택 =====
# "vllm"   : 직접 서빙한 EXAONE4 vLLM 서버 사용 (기본)
# "gemini" : Google Gemini API 사용 (서버 기동 불필요)
# 환경변수 C2_LLM_PROVIDER 가 이 값보다 우선함 (예: C2_LLM_PROVIDER=gemini)
# ※ Gemini 는 LangGraph 백엔드(C2_AGENT_BACKEND=langgraph, 기본)에서 동작합니다.
llm_provider: "vllm"

# ===== Gemini API 설정 (llm_provider=gemini 일 때 사용) =====
gemini_model:
  model: "gemini-2.0-flash"        # 예: gemini-2.0-flash, gemini-1.5-pro
  # API 키는 이 파일에 직접 넣지 말고 환경변수로 주입하세요.
  #   export GOOGLE_API_KEY="<your-key>"   (또는 GEMINI_API_KEY)
  # 아래는 키가 저장된 "환경변수 이름"일 뿐, 키 값이 아닙니다.
  api_key_env: "GOOGLE_API_KEY"
  generation:
    temperature: 0.1
    max_tokens: 4096

# ===== EXAONE4 메인 에이전트 모델 =====
# 상황 분석, 최종 응답 생성 담당
# AWQ 4bit → 실사용 ~18GB
#
# vLLM 서빙 구조: 모델은 별도 프로세스의 vLLM 서버가 로드하고,
# 애플리케이션은 serving.base_url(또는 host:port)로 OpenAI 호환 API 요청만 보냄.
# 서버 기동: python scripts/launch_vllm_servers.py
# 엔진 파라미터(gpu_memory_utilization 등)는 서버 기동 스크립트가 사용함.
agent_model:
  model_id: "LGAI-EXAONE/EXAONE-4.0-32B"
  quantization: "awq_marlin"   # A100에서 빠른 4bit 커널 (호환 문제 시 "awq")
  model_id_awq: "LGAI-EXAONE/EXAONE-4.0-32B-AWQ"
  tensor_parallel_size: 1
  # ── GPU 환경별 설정 (단일 모델 전용 GPU 기준) ────────────────
  # A100 80GB : gpu_memory_utilization: 0.90 / max_model_len: 32768
  # A100 40GB : gpu_memory_utilization: 0.90 / max_model_len: 16384 (OOM 시 하향)
  # ────────────────────────────────────────────────────────────
  # KV 캐시를 크게 잡아 프리엠션/재연산을 없애고 동시 처리량을 높인다.
  gpu_memory_utilization: 0.90
  dtype: "float16"
  max_model_len: 32768
  # ── 추론 속도 최적화 ─────────────────────────────────────────
  # awq_marlin : Ampere(A100)에서 기본 awq보다 빠른 4bit 커널 (실패 시 "awq"로 폴백)
  # enforce_eager=false : CUDA 그래프 사용 → 디코드 속도 향상 (VRAM 여유 있을 때 권장)
  # enable_prefix_caching : 반복되는 시스템 프롬프트/상황 블록 접두어 재사용 → TTFT 단축
  # max_num_seqs : 동시 처리 시퀀스 상한 (KV 캐시가 크므로 높여 처리량 확보)
  enforce_eager: false
  enable_prefix_caching: true
  max_num_seqs: 64
  generation:
    temperature: 0.1
    max_tokens: 4096
  serving:
    host: "127.0.0.1"
    port: 8000
    # base_url을 지정하면 host/port보다 우선함 (예: "http://gpu-server:8000/v1")
    # 환경변수 C2_AGENT_VLLM_BASE_URL이 최우선
    base_url: ""
    served_model_name: "exaone4-agent"
    api_key: "EMPTY"
    request_timeout: 600

# ===== A100 80GB 단일 GPU 예상 메모리 사용량 =====
# EXAONE4 AWQ 32B 가중치 ~19GB + KV 캐시(gpu_util 0.90 → 예약 ~72GB 중 나머지 전부)
# gpu_util 0.30(≈24GB)에서는 KV 캐시가 작아 긴 컨텍스트/동시 요청 시 재연산으로 느려짐.
# 0.90으로 올리면 KV 캐시가 커져 프리엠션이 사라지고 처리량이 크게 향상됨.
