# ===== 임베딩 모델 =====
embedding:
  model_name: "apple/MobileCLIP-S2"
  image_size: 336
  embedding_dim: 512        # open_clip MobileCLIP-S2: 512 / CLIP-ViT-L/14 fallback: 768
  device: "cuda"
  batch_size: 8

# ===== 이벤트 설명 모델 (경량 VLM) =====
event_description:
  model_name: "HuggingFaceTB/SmolVLM2-2.2B-Instruct"
  device: "cuda"
  temperature: 0.7
  max_new_tokens: 512
  batch_size: 4

# ===== EXAONE4 메인 에이전트 모델 =====
# 상황 분석, 비디오 이해, 최종 응답 생성 담당
# AWQ 4bit → 실사용 ~18GB
#
# vLLM 서빙 구조: 모델은 별도 프로세스의 vLLM 서버가 로드하고,
# 애플리케이션은 serving.base_url(또는 host:port)로 OpenAI 호환 API 요청만 보냄.
# 서버 기동: python scripts/launch_vllm_servers.py
# 엔진 파라미터(gpu_memory_utilization 등)는 서버 기동 스크립트가 사용함.
agent_model:
  model_id: "LGAI-EXAONE/EXAONE-4.0-32B"
  quantization: "awq"
  model_id_awq: "LGAI-EXAONE/EXAONE-4.0-32B-AWQ"
  tensor_parallel_size: 1
  # ── GPU 환경별 설정 ──────────────────────────────────────────
  # A100 80GB : gpu_memory_utilization: 0.30 / max_model_len: 32768
  # A100 40GB : gpu_memory_utilization: 0.45 / max_model_len: 12288
  # ────────────────────────────────────────────────────────────
  gpu_memory_utilization: 0.30
  dtype: "float16"
  max_model_len: 32768
  generation:
    temperature: 0.1
    max_tokens: 4096
  serving:
    host: "127.0.0.1"
    port: 8000
    # base_url을 지정하면 host/port보다 우선함 (예: "http://gpu-server:8000/v1")
    # 환경변수 C2_AGENT_VLLM_BASE_URL이 최우선
    base_url: ""
    served_model_name: "exaone4-agent"
    api_key: "EMPTY"
    request_timeout: 600

# ===== EXAONE Deep 전략/전술 전문 모델 =====
# 군사 전략 및 전술 추천 생성 전담
# 7.8B BF16 → 실사용 ~16GB
# EXAONE4 AWQ 수정 후: 80GB - 24GB = 56GB 여유 → 7.8B 충분히 로딩 가능
strategy_model:
  model_id: "LGAI-EXAONE/EXAONE-Deep-7.8B"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.45
  dtype: "bfloat16"
  max_model_len: 32768             # KV 에러 시 gpu_memory_utilization을 높이거나 줄이기 (최소 4096)
  generation:
    temperature: 0.2
    max_tokens: 8192
  serving:
    host: "127.0.0.1"
    port: 8001
    # base_url을 지정하면 host/port보다 우선함
    # 환경변수 C2_STRATEGY_VLLM_BASE_URL이 최우선
    base_url: ""
    served_model_name: "exaone-deep-strategy"
    api_key: "EMPTY"
    request_timeout: 600

# ===== A100 80GB 단일 GPU 예상 메모리 사용량 =====
# EXAONE4 AWQ 32B:       24GB  (gpu_util 0.30)
# EXAONE Deep 7.8B BF16: 28GB  (gpu_util 0.35)
# SmolVLM2 2.2B:          5GB
# CLIP/embedding:          2GB
# ─────────────────────────────
# 합계:                  ~59GB  (80GB 중 74% → 여유 21GB)
#
# ===== GPU 증설 시 더 큰 모델 사용 =====
# A100 80GB × 2장:
#   strategy_model.model_id: "LGAI-EXAONE/EXAONE-Deep-32B"
#   tensor_parallel_size: 2, gpu_memory_utilization: 0.80
#
# A100 80GB × 4장:
#   agent_model: tensor_parallel_size: 2, gpu_memory_utilization: 0.45
#   strategy_model: tensor_parallel_size: 2, gpu_memory_utilization: 0.80
